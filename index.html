<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kadesh Map</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: black;
    }

    #map {
      width: 100%;
      height: 100%;
      background: black;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Create map
  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 4
  });

  // Image dimensions
  const imageWidth = 8192;
  const imageHeight = 8192;

  // Define image bounds
  const bounds = [[0, 0], [imageHeight, imageWidth]];

  // Add image overlay
  L.imageOverlay('Kadesh.png', bounds).addTo(map);

  // Fit map to image
  map.fitBounds(bounds);

  // --- TOP LEFT HEX TEST ---

  // AppSheet XY for 300:300 = 1.33,1
  const centerX = (1.33 / 100) * imageWidth;
  const centerY = (1 / 100) * imageHeight;

  // Hex size
  const hexRadius = 70;

  // Build a pointy-top hex polygon
  function makeHex(centerX, centerY, radius) {
    const points = [];

    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 180 * (60 * i - 30);

      const x = centerX + radius * Math.cos(angle);
      const y = centerY + radius * Math.sin(angle);

      // Leaflet uses [Y, X]
      points.push([y, x]);
    }

    return points;
  }

  // Draw hex
  const topLeftHex = L.polygon(
    makeHex(centerX, centerY, hexRadius),
    {
      color: 'red',
      weight: 3,
      fillColor: 'yellow',
      fillOpacity: 0.25,
      opacity: 1
    }
  ).addTo(map);

  topLeftHex.bindPopup('300:300');

  // Zoom directly to test hex
  map.setView([centerY, centerX], 2);

  console.log('Hex drawn');
  alert('Hex test loaded');

</script>

</body>
</html>
