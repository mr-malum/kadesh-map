<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kadesh Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body, #map {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background-image: url('Parchemnt_Tile.png');
      background-repeat: repeat;
    }

    #map {
      background-image: url('Parchemnt_Tile.png');
      background-repeat: repeat;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 4
  });

  const imageWidth = 8192;
  const imageHeight = 8192;

  const bounds = [[0, 0], [imageHeight, imageWidth]];

  L.imageOverlay('Kadesh.png', bounds).addTo(map);

  map.fitBounds(bounds);

  const centerX = (1.33 / 100) * imageWidth;
  const centerY = imageHeight - ((1 / 100) * imageHeight);

  const hexWidth = 165;
  const hexHeight = 145;

  function makeHex(centerX, centerY, width, height) {
    return [
      [centerY, centerX + width],
      [centerY + height * 0.5, centerX + width * 0.5],
      [centerY + height * 0.5, centerX - width * 0.5],
      [centerY, centerX - width],
      [centerY - height * 0.5, centerX - width * 0.5],
      [centerY - height * 0.5, centerX + width * 0.5]
    ];
  }

  const topLeftHex = L.polygon(
    makeHex(centerX, centerY, hexWidth, hexHeight),
    {
      color: 'red',
      weight: 3,
      fillColor: 'yellow',
      fillOpacity: 0.15,
      opacity: 1
    }
  ).addTo(map);

  topLeftHex.bindPopup('300:300');

  map.setView([centerY, centerX], 2);
</script>

</body>
</html>
