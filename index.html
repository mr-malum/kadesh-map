<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kadesh Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="parchment-bg"></div>
<div id="map"></div>

<div id="app-panel" class="closed">
  <div id="app-panel-header">
    <button id="panel-close" type="button">×</button>

    <div>
      <div id="panel-subtitle">Hex</div>
      <h2 id="panel-title">Select a Hex</h2>
    </div>
  </div>

  <div id="panel-content">
    Click any hex to view its details.
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data-loader.js"></script>

<script>

  let db = null;

  loadDatabase().then(loadedDb => {
    db = loadedDb;
    console.log("Database loaded:", db);
  });

  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 0,
    maxBoundsViscosity: 0.5
  });

  const imageWidth = 8192;
  const imageHeight = 8192;

  const bounds = [[0, 0], [imageHeight, imageWidth]];

  L.imageOverlay('Kadesh.png', bounds).addTo(map);

  map.fitBounds(bounds);

  function updatePanBounds() {
    const zoom = map.getZoom();

    const padding =
      zoom < -2 ? 2000 :
      zoom < -1 ? 1200 :
      zoom < 0  ? 700  :
                  300;

    map.setMaxBounds([
      [-padding, -padding],
      [imageHeight + padding, imageWidth + padding]
    ]);
  }

  map.on('zoomend', updatePanBounds);
  updatePanBounds();

  const isTouchDevice =
    window.matchMedia('(pointer: coarse)').matches;

  const centerX = (1.33 / 100) * imageWidth;
  const centerY = imageHeight - ((1 / 100) * imageHeight);

  const hexWidth = 105;
  const hexHeight = 155;

  function makeHex(centerX, centerY, width, height) {
    return [
      [centerY, centerX + width],
      [centerY + height * 0.5, centerX + width * 0.5],
      [centerY + height * 0.5, centerX - width * 0.5],
      [centerY, centerX - width],
      [centerY - height * 0.5, centerX - width * 0.5],
      [centerY - height * 0.5, centerX + width * 0.5]
    ];
  }

  const startX = centerX;
  const startY = centerY;

  const rowStepY = 162.22;
  const colStepX = 325.51;

  const oddColY = rowStepY / -2;
  const oddColX = colStepX / 2;

  function getHexCenter(xxx, yyy) {
    const row = xxx - 300;
    const col = yyy - 300;

    const pair = Math.floor(col / 2);
    const odd = col % 2;

    const x =
      startX +
      (pair * colStepX) +
      (odd * oddColX);

    const y =
      startY -
      (row * rowStepY) +
      (odd * oddColY);

    return { x, y };
  }

    let selectedHex = null;
    
    let panelHistory = [];
    
    function pushPanelScreen(renderer) {
      panelHistory.push(renderer);
      renderer();
    }
    
    function goBackPanel() {
      panelHistory.pop();
    
      const previous = panelHistory[panelHistory.length - 1];
    
      if (previous) {
        previous();
      } else {
        document.getElementById('app-panel')
          .classList.remove('open');
      }
    }

  const defaultStyle = {
    color: '#ffffff',
    weight: 4,
    opacity: 0.10,
    fillColor: '#ffffff',
    fillOpacity: 0.015,
    className: 'hex-glow'
  };

  const hoverStyle = {
    opacity: 0.30,
    fillOpacity: 0.05,
    weight: 6
  };

  const selectedStyle = {
    opacity: 0.60,
    fillOpacity: 0.10,
    weight: 8
  };

  function selectHex(hex) {
    if (selectedHex && selectedHex !== hex) {
      selectedHex.setStyle(defaultStyle);
    }

    selectedHex = hex;
    hex.setStyle(selectedStyle);
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function getRowsByField(rows, fieldName, value) {
    if (!Array.isArray(rows)) return [];

    return rows.filter(row => row?.[fieldName] === value);
  }

  function renderList(title, rows, emptyText, labelFields) {
    if (!rows.length) {
      return `
        <section>
          <h3>${title}</h3>
          <p>${emptyText}</p>
        </section>
      `;
    }

    return `
      <section>
        <h3>${title}</h3>
        <ul>
          ${rows.map(row => {
            const label = labelFields
              .map(field => row?.[field])
              .filter(Boolean)
              .join(" — ");

            return `<li>
  <button
    class="panel-link"
    onclick="pushPanelScreen(() => renderPoiScreen('${row.POI_ID}'))"
  >
    ${escapeHtml(label || "Unnamed")}
  </button>
</li>`;
          }).join("")}
        </ul>
      </section>
    `;
  }

  function renderHexScreen(hexId) {
    const hex = db?.hexesById?.[hexId];

    const region =
      hex?.Region_ID_Ref
        ? db?.regionsById?.[hex.Region_ID_Ref]
        : null;

    const pois =
      db?.poisByHexId?.[hexId] ||
      getRowsByField(db?.raw?.pois, "Hex_ID_Ref", hexId);

    document.getElementById('app-panel')
      .classList.add('open');

    document.getElementById('panel-title')
      .textContent = hex ? `Hex ${hex.Hex_ID}` : hexId;

    document.getElementById('panel-subtitle')
      .textContent = hex?.Terrain || "Unknown Terrain";

    document.getElementById('panel-content').innerHTML = `
      <p><strong>Hex:</strong> ${escapeHtml(hexId)}</p>

      <p>
        <strong>Terrain:</strong>
        ${escapeHtml(hex?.Terrain || 'Unknown')}
      </p>

      <p>
        <strong>Region:</strong>
        ${escapeHtml(region?.Region_Name || hex?.Region_ID_Ref || 'Unknown')}
      </p>

      ${renderList(
        "Points of Interest",
        pois,
        "No known points of interest in this hex.",
        ["Name", "POI_Type", "Notoriety Tier"]
      )}
    `;
  }

  function renderPoiScreen(poiId) {

  const poi = db?.poisById?.[poiId];

  if (!poi) return;

  const npcs =
    db?.npcsByHomeId?.[poiId] || [];

  document.getElementById('app-panel')
    .classList.add('open');

  document.getElementById('panel-title')
    .textContent = poi.Name || "Unknown POI";

  document.getElementById('panel-subtitle')
    .textContent = poi.POI_Type || "POI";

  document.getElementById('panel-content').innerHTML = `

    <button
  class="panel-link"
  onclick="goBackPanel()"
>
      ← Back
    </button>

    <p>
      ${escapeHtml(poi.Description || "No description.")}
    </p>

    <h3>NPCs</h3>

    ${
      npcs.length
        ? `
          <ul>
            ${npcs.map(npc => `
              <li>
                <button
                  class="panel-link"
                  onclick="pushPanelScreen(() => renderNpcScreen('${npc.NPC_ID}'))"
                >
                  ${escapeHtml(npc.Name)}
                </button>
              </li>
            `).join("")}
          </ul>
        `
        : `<p>No NPCs.</p>`
    }
  `;
}

  function renderNpcScreen(npcId) {

  const npc = db?.npcsById?.[npcId];

  if (!npc) return;

  document.getElementById('app-panel')
    .classList.add('open');

  document.getElementById('panel-title')
    .textContent = npc.Name || "Unknown NPC";

  document.getElementById('panel-subtitle')
    .textContent = npc.Role || "NPC";

  document.getElementById('panel-content').innerHTML = `

    <button
  class="panel-link"
  onclick="goBackPanel()"
>
      ← Back
    </button>

    <p>
      ${escapeHtml(npc.Description || "No description.")}
    </p>
  `;
}

  function openPanelForHex(hexId) {
  panelHistory = [];
  pushPanelScreen(() => renderHexScreen(hexId));
}

window.openPanelForHex = openPanelForHex;
window.renderPoiScreen = renderPoiScreen;
window.renderNpcScreen = renderNpcScreen;
window.goBackPanel = goBackPanel;
window.pushPanelScreen = pushPanelScreen;

  for (let xxx = 300; xxx < 350; xxx++) {
    for (let yyy = 300; yyy < 350; yyy++) {

      const { x, y } = getHexCenter(xxx, yyy);
      const hexId = `${xxx}:${yyy}`;

      const hex = L.polygon(
        makeHex(x, y, hexWidth, hexHeight),
        defaultStyle
      ).addTo(map);

      hex.on('mouseover', function () {
        if (!isTouchDevice && this !== selectedHex) {
          this.setStyle(hoverStyle);
        }
      });

      hex.on('mouseout', function () {
        if (!isTouchDevice && this !== selectedHex) {
          this.setStyle(defaultStyle);
        }
      });

      hex.on('click', function (e) {

        L.DomEvent.stopPropagation(e);

        selectHex(this);

        const data = db?.hexesById?.[hexId];

        if (isTouchDevice) {

          this.bindPopup(`
            <div style="min-width:180px;">
              <strong>${escapeHtml(hexId)}</strong><br>
              ${escapeHtml(data?.Terrain || 'Unknown')}<br><br>

              <button
                onclick="openPanelForHex('${hexId}')"
                style="
                  width:100%;
                  padding:10px;
                  border:none;
                  border-radius:8px;
                  background:#4a3720;
                  color:#f4e6c8;
                  cursor:pointer;
                "
              >
                Open Details
              </button>
            </div>
          `).openPopup();

        } else {

          panelHistory = [];

          pushPanelScreen(() => renderHexScreen(hexId));

        }
      });
    }
  }

  map.on('click', function () {

    document.getElementById('app-panel')
      .classList.remove('open');

    if (selectedHex) {
      selectedHex.setStyle(defaultStyle);
      selectedHex = null;
    }
  });

  document.getElementById('panel-close')
    .addEventListener('click', function () {

      document.getElementById('app-panel')
        .classList.remove('open');

      if (selectedHex) {
        selectedHex.setStyle(defaultStyle);
        selectedHex = null;
      }
    });
</script>

</body>
</html>
