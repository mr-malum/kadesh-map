<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:wght@400;500;600&family=Marcellus+SC&display=swap" rel="stylesheet" />
  <meta charset="utf-8" />
  <title>Kadesh Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="parchment-bg"></div>
<div id="map"></div>

<div id="atlas-button" role="button" aria-label="Open Atlas"></div>

<div id="atlas-overlay" class="closed">
  <div id="atlas-modal">
    <button id="atlas-close" type="button">✗</button>

    <div id="atlas-header">
      <div id="atlas-subtitle">The Codex of Kadesh</div>
      <h2 id="atlas-title">The Atlas</h2>
    </div>

    <div id="atlas-content">
      <button class="atlas-section-button" type="button">Search</button>
      <button class="atlas-section-button" type="button">Regions</button>
      <button class="atlas-section-button" type="button">Points of Interest</button>
      <button class="atlas-section-button" type="button">NPCs</button>
    </div>
  </div>
</div>
 
<div id="app-panel" class="closed right">
  <div id="app-panel-header">
    <button id="panel-close" type="button">✗</button>

    <div>
      <div id="panel-subtitle"></div>
      <h2 id="panel-title">Select a Hex</h2>
    </div>
  </div>

  <div id="panel-content">
    Click any hex to view its details.
  </div>

  <div id="mobile-panel-nav">
    <button id="mobile-panel-back" type="button">← Back</button>
    <button id="mobile-panel-close" type="button">✗</button>
  </div>
</div>
 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data-loader.js"></script>
<script src="app.js"></script>

</body>
</html>
